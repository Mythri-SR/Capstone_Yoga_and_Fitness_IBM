name: Playwright Allure Report

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-allure
  cancel-in-progress: true

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: yoga_fitness
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      CI: true
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: yoga_fitness
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright dependencies
        working-directory: ./playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./playwright
        run: npx playwright install --with-deps chromium

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot && exit 0
            sleep 2
          done
          echo "MySQL did not become healthy in time"
          exit 1

      - name: Initialize schema and seed
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot yoga_fitness < ./database/schema.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot yoga_fitness < ./database/seed.sql

      - name: Clean previous reports
        run: |
          rm -rf ./playwright/allure-results
          rm -rf ./playwright/allure-report
          rm -rf ./allure-report

      - name: Run Playwright tests (chromium only)
        working-directory: ./playwright
        run: npx playwright test --project=chromium

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate ./playwright/allure-results --clean -o ./allure-report

      - name: Upload Allure artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report